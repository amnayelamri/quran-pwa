<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1a4a2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>القرآن الكريم</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="القرآن" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="header">
      <button id="btn-prev" class="nav-btn" aria-label="الصفحة السابقة">&#8593;</button>
      <div id="page-info">
        <span class="ornament">✦ ✦ ✦</span>
        <span id="page-counter"><span id="page-number">1</span> / 485</span>
        <span id="hizb-indicator" class="hizb-indicator">حزب 1</span>
      </div>
      <button id="btn-next" class="nav-btn" aria-label="الصفحة التالية">&#8595;</button>
      <button id="btn-goto" class="nav-btn" aria-label="انتقل إلى حزب" title="انتقل إلى حزب">حزب</button>
    </header>

    <!-- Main swipe container -->
    <div id="main-container">

      <!-- Vertical pages (Quran) -->
      <div id="quran-track">
        <div class="quran-page-wrapper" id="page-prev-wrapper">
          <img class="quran-page-img" id="img-prev" src="" alt="" />
        </div>
        <div class="quran-page-wrapper active" id="page-curr-wrapper">
          <img class="quran-page-img" id="img-curr" src="" alt="صفحة القرآن" />
          <div id="loading-spinner" class="spinner">&#9685;</div>
        </div>
        <div class="quran-page-wrapper" id="page-next-wrapper">
          <img class="quran-page-img" id="img-next" src="" alt="" />
        </div>
      </div>

      <!-- Horizontal elements panel (swipe left to reveal) -->
      <div id="elements-panel">
        <div id="elements-panel-inner">
          <div class="panel-header">
            <span class="panel-bismillah">﷽</span>
            <div id="elements-panel-title">إضافات الصفحة <span id="elements-page-num"></span></div>
          </div>
          <div id="elements-list"></div>
          <div id="elements-empty" class="elements-empty">لا توجد إضافات لهذه الصفحة</div>
        </div>
      </div>

    </div>

    <!-- Go to page modal -->
    <div id="goto-modal" class="modal hidden">
      <div class="modal-box">
        <span class="modal-ornament">☽</span>
        <h3>انتقل إلى حزب</h3>
        <input type="number" id="goto-input" min="1" max="60" placeholder="رقم الحزب (1-60)" />
        <div class="modal-buttons">
          <button id="goto-confirm">انتقل</button>
          <button id="goto-cancel">إلغاء</button>
        </div>
      </div>
    </div>

    <!-- Elements panel toggle hint -->
    <div id="swipe-hint" class="swipe-hint">&#8592; اسحب يساراً لرؤية الإضافات</div>

    <!-- Bannière installation iOS -->
    <div id="ios-banner" class="ios-banner hidden">
      <button id="ios-banner-close" class="ios-close">✕</button>
      <div class="ios-icon">☽</div>
      <div class="ios-text">
        <strong>Installer l'application</strong>
        <span>Appuyez sur <b>⎋ Partager</b> puis <b>« Sur l'écran d'accueil »</b> dans Safari</span>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
