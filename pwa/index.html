<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a4a2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>القرآن الكريم</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="header">
      <button id="btn-prev" class="nav-btn" aria-label="الصفحة السابقة">&#8593;</button>
      <div id="page-info">
        <span id="page-number">1</span>
        <span> / 485</span>
      </div>
      <button id="btn-next" class="nav-btn" aria-label="الصفحة التالية">&#8595;</button>
      <button id="btn-goto" class="nav-btn" aria-label="انتقل إلى صفحة">&#9776;</button>
    </header>

    <!-- Main swipe container -->
    <div id="main-container">

      <!-- Vertical pages (Quran) -->
      <div id="quran-track">
        <div class="quran-page-wrapper" id="page-prev-wrapper">
          <img class="quran-page-img" id="img-prev" src="" alt="" />
        </div>
        <div class="quran-page-wrapper active" id="page-curr-wrapper">
          <img class="quran-page-img" id="img-curr" src="" alt="صفحة القرآن" />
          <div id="loading-spinner" class="spinner">&#9685;</div>
        </div>
        <div class="quran-page-wrapper" id="page-next-wrapper">
          <img class="quran-page-img" id="img-next" src="" alt="" />
        </div>
      </div>

      <!-- Horizontal elements panel (swipe left to reveal) -->
      <div id="elements-panel">
        <div id="elements-panel-inner">
          <h2 id="elements-panel-title">إضافات الصفحة <span id="elements-page-num"></span></h2>
          <div id="elements-list"></div>
          <div id="elements-empty" class="elements-empty">لا توجد إضافات لهذه الصفحة</div>
        </div>
      </div>

    </div>

    <!-- Go to page modal -->
    <div id="goto-modal" class="modal hidden">
      <div class="modal-box">
        <h3>انتقل إلى صفحة</h3>
        <input type="number" id="goto-input" min="1" max="485" placeholder="رقم الصفحة (1-485)" />
        <div class="modal-buttons">
          <button id="goto-confirm">انتقل</button>
          <button id="goto-cancel">إلغاء</button>
        </div>
      </div>
    </div>

    <!-- Elements panel toggle hint -->
    <div id="swipe-hint" class="swipe-hint">&#8592; اسحب لرؤية الإضافات</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
